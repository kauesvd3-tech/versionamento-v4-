<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pagina">

<div class="conteudo">
    <h2>🖼️ Galeria de Imagens</h2>
    <p>Confira alguns exemplos de imagens organizadas em formato de galeria responsiva.</p>

    <div class="grid-imagens">
        <img src="https://picsum.photos/400/300?1">
        <img src="https://picsum.photos/400/300?2">
        <img src="https://picsum.photos/400/300?3">
        <img src="https://picsum.photos/400/300?4">
        <img src="https://picsum.photos/400/300?5">
        <img src="https://picsum.photos/400/300?6">
    </div>
</div>
<footer>
  <p id="contador"></p>
</footer>

<script>
let visitas = localStorage.getItem("visitas");

if (visitas) {
  visitas = parseInt(visitas) + 1;
} else {
  visitas = 1;
}

localStorage.setItem("visitas", visitas);

document.getElementById("contador").innerText =
  "Visitas: " + visitas;
</script>
</body>
</html>
