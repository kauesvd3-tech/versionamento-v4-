<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pagina">

<div class="conteudo">
    <h2>🎥 Vídeos Educativos</h2>

    <div class="grid-videos">
        <iframe src="https://www.youtube.com/embed/n_Etdr7Dbjs" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/UB1O30fR-EE" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/pQN-pnXPaVg" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/watch?v=S9uPNppGsGo&list=PLvE-ZAFRgX8hnECDn1v9HNTI71veL3oW0" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/watch?v=AB35iSr1YyA" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/watch?v=Z7mnxUI4u00" allowfullscreen></iframe>
    </div>
</div>
<footer>
  <p id="contador"></p>
</footer>

<script>
let visitas = localStorage.getItem("visitas");

if (visitas) {
  visitas = parseInt(visitas) + 1;
} else {
  visitas = 1;
}

localStorage.setItem("visitas", visitas);

document.getElementById("contador").innerText =
  "Visitas: " + visitas;
</script>
</body>
</html>
