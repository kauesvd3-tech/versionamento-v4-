<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Site Profissional V5</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <nav class="menu-lateral">
        <h2>📚 Menu</h2>
        <ul>
            <li><a href="conteudo1.html" target="frameConteudo">🎥 Vídeos</a></li>
            <li><a href="conteudo2.html" target="frameConteudo">🖼️ Imagens</a></li>
            <li><a href="conteudo3.html" target="frameConteudo">📄 Sobre</a></li>
            <li><a href="admin.html" target="frameConteudo">⚙️ Admin</a></li>
        </ul>

        <button onclick="document.body.classList.toggle('dark')">🌙 Dark Mode</button>
        <button onclick="window.location.href='login.html'" style="margin-top:10px; background:#e74c3c; color:white;">🚪 Sair</button>
    </nav>

    <header class="cabecalho">
        <h1>🌐 Painel Mini Site Profissional</h1>
    </header>

    <main class="principal">

        <!-- SLIDESHOW -->
        <div class="slideshow">
            <div class="slide ativo">
                <img src="https://picsum.photos/800/300?1">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/800/300?2">
            </div>

            <div class="slide">
                <img src="https://picsum.photos/800/300?3">
            </div>

            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>
        </div>

        <iframe name="frameConteudo" src="conteudo1.html"></iframe>

    </main>

    <footer class="rodape">
        👥 Visitantes: <span id="contador"></span>
    </footer>

</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function mostrarSlide(n) {
    slides.forEach(slide => slide.classList.remove("ativo"));
    slides[n].classList.add("ativo");
}

function proximoSlide() {
    index = (index + 1) % slides.length;
    mostrarSlide(index);
}

function slideAnterior() {
    index = (index - 1 + slides.length) % slides.length;
    mostrarSlide(index);
}

document.querySelector(".next").onclick = proximoSlide;
document.querySelector(".prev").onclick = slideAnterior;

setInterval(proximoSlide, 4000);
mostrarSlide(index);

// CONTADOR
let visitas = localStorage.getItem("visitas");

if (!visitas) {
    visitas = 1;
} else {
    visitas = parseInt(visitas) + 1;
}

localStorage.setItem("visitas", visitas);
document.getElementById("contador").innerText = visitas;
</script>

</body>
</html>
